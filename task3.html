<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <span id="count">0</span>
    <button id="decrement">-</button>
    <button id="increment">+</button>

    <script>
       const elementCount=document.getElementById("count");
       const decrementFun=document.getElementById("decrement");
       const incrementfun=document.getElementById("increment");
       let count=0;
       decrementFun.addEventListener("click",()=>{
        count--;
        elementCount.textContent=count
       });
       incrementfun.addEventListener("click",()=>{
        count++;
        elementCount.textContent=count;
       })
    </script>
</body>
</html>
