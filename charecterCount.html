<!DOCTYPE html>
<html>
<head>
<title>Character Counter</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:100px;
}
textarea{
width:300px;
height:100px;
}
</style>
</head>

<body>

<h3>Enter Message</h3>

<textarea id="text" maxlength="100" onkeyup="countChar()"></textarea>

<p>Characters: <span id="count">0</span>/100</p>

<script>

function countChar(){
let text=document.getElementById("text").value;
document.getElementById("count").innerText=text.length;
}

</script>

</body>
</html>
