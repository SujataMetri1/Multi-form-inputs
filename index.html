<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Step Registration Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="formContainer">
    <div class="stepper">
      <div class="step active">1</div>
      <div class="step">2</div>
      <div class="step">3</div>
      <div class="step">4</div>
    </div>

    <form id="regForm">
      <div class="form-step active">
        <h2>Personal Information</h2>
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="phone" placeholder="Phone" required>
        <p class="error"></p>
        <button type="button" class="next">Next</button>
      </div>
      <div class="form-step">
        <h2>Address Details</h2>
        <input type="text" id="street" placeholder="Street" required>
        <input type="text" id="city" placeholder="City" required>
        <select id="country" required>
          <option value="">Select Country</option>
            <option value="usa">USA</option>
            <option value="canada">Canada</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>
              </select>
        <p class="error"></p>
        <button type="button" class="prev">Back</button>
        <button type="button" class="next">Next</button>
      </div>
      <div class="form-step">
        <h2>Account Setup</h2>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <p class="error"></p>
        <button type="button" class="prev">Back</button>
        <button type="button" class="next">Next</button>
      </div>
    <div class="form-step">
        <h2>Review & Submit</h2>
        <div id="review"></div>
        <button type="button" class="prev">Back</button>
        <button type="submit">Submit</button>
      </div>
    </form>
  </div>

  
  <div class="success-page" id="successPage" style="display:none;">
    <h1>🎉 Registration Successful!</h1>
    <p>You can now go back to the home page.</p>
    <button id="goHome">Go Home</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
